<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Clip Card Final Test - Icon & Layout</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #343434;
      --panel: rgba(255,255,255,0.08);
      --panel-border: rgba(255,255,255,0.14);
      --accent: #9dcea3;
      --used: rgba(184, 184, 184, 0.2);
      --available: rgba(255,255,255,0.42);
      --white: #fff;
      --muted: #cfcfcf;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: "Nunito Sans", Arial, sans-serif;
    }

    body { padding: 32px 20px 48px; }

    .content {
      width: min(100%, 1120px);
      margin: 0 auto;
    }

    .eyebrow {
      margin: 0 0 10px;
      color: var(--accent);
      font-size: 13px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .title {
      margin: 0 0 10px;
      font-family: "Nunito", "Nunito Sans", Arial, sans-serif;
      font-size: 34px;
      line-height: 1.1;
      font-weight: 900;
      text-align: center;
    }

    .subtitle {
      margin: 0 auto 24px;
      color: var(--muted);
      font-size: 16px;
      line-height: 1.6;
      max-width: 740px;
      text-align: center;
    }

    .progress {
      margin-bottom: 24px;
      padding: 12px 16px;
      border-radius: 10px;
      background: rgba(157, 206, 163, 0.1);
      color: var(--accent);
      font-size: 13px;
      font-weight: 700;
    }

    .question-block {
      display: none;
      min-height: calc(100vh - 250px);
      margin-bottom: 20px;
      padding: 24px;
      border-radius: 18px;
      background: var(--panel);
      border: 1px solid var(--panel-border);
    }

    .question-block.active { display: block; }

    .question-number {
      margin-bottom: 8px;
      color: var(--accent);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }

    .question-text {
      margin: 0 0 10px;
      font-size: 18px;
      line-height: 1.4;
      font-weight: 800;
    }

    .question-help {
      margin: 0 0 18px;
      color: var(--muted);
      font-size: 14px;
      line-height: 1.5;
    }

    .variant-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 18px;
      margin-bottom: 8px;
    }

    .mini-card-wrap {
      width: 100%;
      padding: 16px;
      border-radius: 14px;
      background: rgba(0,0,0,0.18);
      border: 1px solid var(--panel-border);
      cursor: pointer;
      transition: all .2s ease;
    }

    .mini-card-wrap:hover {
      border-color: var(--accent);
      background: rgba(157, 206, 163, 0.08);
    }

    .variant-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }

    .variant-label {
      font-size: 12px;
      color: var(--accent);
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .variant-description {
      margin-top: 12px;
      font-size: 13px;
      color: #ececec;
      font-weight: 700;
      line-height: 1.35;
    }

    .option-select {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 12px;
      font-size: 14px;
      font-weight: 800;
      color: var(--white);
      cursor: pointer;
    }

    .option-select input,
    .choice-item input,
    .radio-item input {
      width: 18px;
      height: 18px;
      accent-color: var(--accent);
      cursor: pointer;
      flex-shrink: 0;
    }

    .choice-group,
    .radio-group {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .choice-item,
    .radio-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px;
      border-radius: 12px;
      background: rgba(0,0,0,0.18);
      border: 1px solid var(--panel-border);
      transition: all .2s ease;
      cursor: pointer;
    }

    .choice-item:hover,
    .radio-item:hover {
      border-color: var(--accent);
      background: rgba(157, 206, 163, 0.08);
    }

    .choice-label,
    .radio-label {
      margin: 0;
      font-size: 14px;
      line-height: 1.45;
      color: var(--white);
      cursor: pointer;
      flex: 1;
    }

    .question-visual {
      margin: 0 0 18px;
      padding: 18px;
      border-radius: 14px;
      background: rgba(0,0,0,0.18);
      border: 1px solid var(--panel-border);
    }

    .clip-card {
      position: relative;
      width: 100%;
      max-width: 520px;
      margin: 0 auto;
      border-radius: 24px;
      overflow: hidden;
      min-height: 312px;
      box-shadow: 0 14px 40px rgba(0,0,0,0.24);
      isolation: isolate;
      background: #20392b;
    }

    .card-image-layer,
    .card-overlay-layer {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .card-image-layer {
      z-index: 0;
      background-image: var(--card-bg-image);
      background-size: cover;
      background-position: center;
      transform: scale(1.03);
    }

    .card-overlay-layer {
      z-index: 1;
      background:
        linear-gradient(180deg, rgba(0,0,0,0.18) 0%, rgba(0,0,0,0.34) 45%, rgba(0,0,0,0.58) 100%),
        linear-gradient(0deg, rgba(5, 15, 12, 0.12), rgba(5, 15, 12, 0.12));
    }

    .card-content {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      min-height: 312px;
      padding: 20px;
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 14px;
    }

    .brand-area {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 0;
    }

    .brand-mark {
      width: 30px;
      height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      margin-bottom: 6px;
    }

    .card-title {
      margin: 0;
      font-size: 17px;
      font-weight: 800;
      color: white;
      line-height: 1.2;
    }

    .card-subtitle {
      margin: 2px 0 0;
      font-size: 12px;
      color: rgba(255,255,255,0.82);
      font-weight: 700;
      line-height: 1.35;
    }

    .card-counter {
      white-space: nowrap;
      text-align: right;
      font-size: 17px;
      font-weight: 900;
      color: white;
      margin-top: 4px;
    }

    .card-counter small {
      font-size: 0.95em;
      font-weight: 900;
    }

    .card-spacer {
      flex: 1 1 auto;
      min-height: 90px;
    }

    .clips-grid {
      display: grid;
      grid-template-columns: repeat(10, 1fr);
      gap: 8px;
      margin-top: auto;
    }

    .clip-dot {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 999px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--available);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.18);
    }

    .clip-dot.used-default {
      background: var(--used);
    }

    .clip-dot.used-default .clip-icon {
      opacity: 0.6;
    }

    .clip-icon {
      width: 18px;
      height: 18px;
      display: block;
    }

    .button-group {
      display: flex;
      gap: 12px;
      margin-top: 24px;
    }

    .btn {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: none;
      font-family: "Nunito Sans", Arial, sans-serif;
      font-size: 14px;
      font-weight: 800;
      cursor: pointer;
      transition: all .2s ease;
    }

    .btn-secondary {
      background: rgba(0,0,0,0.18);
      color: var(--white);
      border: 1px solid var(--panel-border);
    }

    .btn-secondary:hover {
      background: rgba(157, 206, 163, 0.1);
      border-color: var(--accent);
    }

    .btn-primary {
      background: var(--accent);
      color: #111;
    }

    .btn-primary:hover {
      background: #8bc795;
    }

    .btn-primary:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .comment-box {
      width: 100%;
      padding: 12px 14px;
      border-radius: 10px;
      border: 1px solid var(--panel-border);
      background: rgba(0,0,0,0.18);
      color: var(--white);
      font-family: 'Nunito Sans', Arial, sans-serif;
      resize: vertical;
      min-height: 70px;
    }

    .feedback-section {
      margin-top: 22px;
      padding-top: 20px;
      border-top: 1px solid var(--panel-border);
    }

    .feedback-label {
      display: block;
      margin: 0 0 10px;
      color: var(--white);
      font-size: 16px;
      font-weight: 800;
      line-height: 1.45;
    }

    .comment-box::placeholder {
      color: rgba(255,255,255,0.48);
    }

    .success {
      display: none;
      min-height: calc(100vh - 220px);
      align-items: center;
      justify-content: center;
      padding: 32px;
      border-radius: 18px;
      background:
        radial-gradient(circle at 20% 20%, rgba(157, 206, 163, 0.18), transparent 24%),
        radial-gradient(circle at 80% 30%, rgba(255, 255, 255, 0.12), transparent 20%),
        rgba(255,255,255,0.06);
      border: 1px solid var(--panel-border);
      text-align: center;
      color: var(--white);
      overflow: hidden;
      position: relative;
      font-family: "Nunito", "Nunito Sans", Arial, sans-serif;
    }

    .success.show { display: flex; }

    .success::before,
    .success::after {
      content: "";
      position: absolute;
      width: 180px;
      height: 180px;
      border-radius: 999px;
      background: rgba(157, 206, 163, 0.12);
      filter: blur(2px);
      animation: floatBubble 5s ease-in-out infinite;
      pointer-events: none;
    }

    .success::before {
      left: -52px;
      bottom: -58px;
    }

    .success::after {
      right: -62px;
      top: -64px;
      animation-delay: -2s;
      background: rgba(255, 255, 255, 0.09);
    }

    .success-inner {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      width: min(100%, 420px);
      padding: 40px 32px;
      border-radius: 28px;
      background: rgba(0,0,0,0.18);
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 18px 48px rgba(0,0,0,0.22);
      font-family: "Nunito", "Nunito Sans", Arial, sans-serif;
    }

    .success-inner h2 {
      margin: 0;
      font-family: "Nunito", "Nunito Sans", Arial, sans-serif;
      font-size: 38px;
      line-height: 1.05;
      font-weight: 900;
      letter-spacing: -0.02em;
    }

    .success-inner p {
      margin: 0;
      font-family: "Nunito", "Nunito Sans", Arial, sans-serif;
      font-size: 16px;
      font-weight: 800;
      color: rgba(255,255,255,0.78);
      line-height: 1.45;
    }

    .success-logo {
      width: 64px;
      height: 68px;
      display: block;
      color: var(--white);
      animation: popIn .45s ease-out both;
    }

    @keyframes popIn {
      from { transform: scale(0.82); opacity: 0; }
      to { transform: scale(1); opacity: 1; }
    }

    @keyframes floatBubble {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-12px) scale(1.05); }
    }

    @media (max-width: 980px) {
      .content { width: min(100%, 760px); }
      .variant-grid { grid-template-columns: 1fr; }
    }

    @media (max-width: 760px) {
      .title { font-size: 28px; }
      .clips-grid { grid-template-columns: repeat(5, 1fr); }
    }

    @media (max-width: 520px) {
      body { padding-inline: 14px; }
      .question-block { padding: 18px; }
      .mini-card-wrap { padding: 12px; }
      .question-visual { padding: 12px; }
      .card-title { font-size: 16px; }
      .brand-mark { width: 24px; height: 24px; }
      .clip-card,
      .card-content { min-height: 286px; }
      .card-content { padding: 16px; }
      .button-group { flex-direction: column; }
      .clip-icon { width: 16px; height: 16px; }
      .clips-grid { gap: 7px; }
    }
  </style>
</head>
<body>
  <div class="content" id="mainContent">
    <div id="introHeader">
      <h1 class="title">Choose the clearest clip card</h1>
      <p class="subtitle">Select the card that makes your remaining clips easiest to understand.</p>
    </div>

    <form id="testForm">
      <section class="question-block active" id="q1" data-step="1">
        <div class="variant-grid">
          <div class="mini-card-wrap">
            <div class="variant-head">
              <div class="variant-label">Option A</div>
            </div>
            <div id="variant-a"></div>
            <label class="option-select"><input type="radio" name="preferred_combination" value="x-first" required> X icon / Used clips first</label>
          </div>

          <div class="mini-card-wrap">
            <div class="variant-head">
              <div class="variant-label">Option B</div>
            </div>
            <div id="variant-b"></div>
            <label class="option-select"><input type="radio" name="preferred_combination" value="x-last"> X icon / Used clips last</label>
          </div>

          <div class="mini-card-wrap">
            <div class="variant-head">
              <div class="variant-label">Option C</div>
            </div>
            <div id="variant-c"></div>
            <label class="option-select"><input type="radio" name="preferred_combination" value="x-red-first"> Red X / Used clips first</label>
          </div>

          <div class="mini-card-wrap">
            <div class="variant-head">
              <div class="variant-label">Option D</div>
            </div>
            <div id="variant-d"></div>
            <label class="option-select"><input type="radio" name="preferred_combination" value="x-red-last"> Red X / Used clips last</label>
          </div>

          <div class="mini-card-wrap">
            <div class="variant-head">
              <div class="variant-label">Option E</div>
            </div>
            <div id="variant-e"></div>
            <label class="option-select"><input type="radio" name="preferred_combination" value="check-first"> Checkmark / Used clips first</label>
          </div>

          <div class="mini-card-wrap">
            <div class="variant-head">
              <div class="variant-label">Option F</div>
            </div>
            <div id="variant-f"></div>
            <label class="option-select"><input type="radio" name="preferred_combination" value="check-last"> Checkmark / Used clips last</label>
          </div>

          <div class="mini-card-wrap">
            <div class="variant-head">
              <div class="variant-label">Option G</div>
            </div>
            <div id="variant-g"></div>
            <label class="option-select"><input type="radio" name="preferred_combination" value="check-green-first"> Green checkmark / Used clips first</label>
          </div>

          <div class="mini-card-wrap">
            <div class="variant-head">
              <div class="variant-label">Option H</div>
            </div>
            <div id="variant-h"></div>
            <label class="option-select"><input type="radio" name="preferred_combination" value="check-green-last"> Green checkmark / Used clips last</label>
          </div>
        </div>

        <div class="feedback-section">
          <label class="feedback-label" for="designComment">Do you have any feedback on the card design? Feel free to share it here.</label>
          <textarea class="comment-box" id="designComment" name="design_comment" placeholder="Write your comment here..."></textarea>
        </div>

        <div class="button-group">
          <button type="submit" class="btn btn-primary" id="submitBtn">Submit</button>
        </div>
      </section>
    </form>

    <div class="success" id="success">
      <div class="success-inner">
        <svg class="success-logo" viewBox="0 0 38 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <g clip-path="url(#clip0)"><path d="M1.19204 39.7779H9.98419C10.3567 39.7779 10.692 39.5927 10.8783 39.2964L18.6646 28.1853C18.8508 27.926 19.2234 27.926 19.4097 28.1853L27.196 39.2964C27.4195 39.5927 27.7548 39.7779 28.0901 39.7779H36.8822C37.7763 39.7779 38.2979 38.7779 37.7764 38.0371L11.2881 0.518591C11.0646 0.222294 10.7293 0.0371094 10.394 0.0371094H1.75086C0.856743 0.0371094 0.335166 1.03711 0.856734 1.77785L13.1881 19.2964C13.2999 19.4445 13.2999 19.6667 13.1881 19.8149L0.297911 38.0371C-0.223658 38.7779 0.29792 39.7779 1.19204 39.7779Z" fill="currentColor"/><path d="M27.7549 0.0371094H36.398C37.2921 0.0371094 37.8137 1.03711 37.2921 1.77785L30.0647 12.0741C29.6176 12.7038 28.7235 12.7038 28.2392 12.0741L23.8431 6.03711C23.5823 5.66674 23.5451 5.14822 23.8431 4.74081L26.8235 0.518591C27.047 0.222294 27.3823 0.0371094 27.7549 0.0371094Z" fill="currentColor"/></g>
          <defs><clipPath id="clip0"><rect width="38" height="40" fill="white"/></clipPath></defs>
        </svg>
        <h2>Thanks!</h2>
        <p>Your answer is saved.</p>
      </div>
    </div>
  </div>

  <script>
    const logoSvg = `<svg aria-hidden="true" class="brand-logo" viewBox="0 0 38 40" fill="none" xmlns="http://www.w3.org/2000/svg"><g clip-path="url(#clip0_14897_42994)"><path d="M1.19204 39.7779H9.98419C10.3567 39.7779 10.692 39.5927 10.8783 39.2964L18.6646 28.1853C18.8508 27.926 19.2234 27.926 19.4097 28.1853L27.196 39.2964C27.4195 39.5927 27.7548 39.7779 28.0901 39.7779H36.8822C37.7763 39.7779 38.2979 38.7779 37.7764 38.0371L11.2881 0.518591C11.0646 0.222294 10.7293 0.0371094 10.394 0.0371094H1.75086C0.856743 0.0371094 0.335166 1.03711 0.856734 1.77785L13.1881 19.2964C13.2999 19.4445 13.2999 19.6667 13.1881 19.8149L0.297911 38.0371C-0.223658 38.7779 0.29792 39.7779 1.19204 39.7779Z" fill="currentColor"/><path d="M27.7549 0.0371094H36.398C37.2921 0.0371094 37.8137 1.03711 37.2921 1.77785L30.0647 12.0741C29.6176 12.7038 28.7235 12.7038 28.2392 12.0741L23.8431 6.03711C23.5823 5.66674 23.5451 5.14822 23.8431 4.74081L26.8235 0.518591C27.047 0.222294 27.3823 0.0371094 27.7549 0.0371094Z" fill="currentColor"/></g><defs><clipPath id="clip0_14897_42994"><rect width="38" height="40" fill="white"/></clipPath></defs></svg>`;
    const xSvg = `<svg class="clip-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M4 4L16 16M16 4L4 16" fill="none" stroke="#fff" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const xRedSvg = `<svg class="clip-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M4 4L16 16M16 4L4 16" fill="none" stroke="#FF5C5C" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/></svg>`;
    const checkSvg = `<svg class="clip-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M20 4.28575C20 4.65128 19.8605 5.017 19.5815 5.29557L8.1529 16.7241C7.875 17.0045 7.50893 17.1429 7.14286 17.1429C6.77679 17.1429 6.41161 17.0034 6.13304 16.7244L0.41875 11.0101C0.139732 10.7322 0 10.3661 0 10C0 9.18396 0.667411 8.57146 1.42857 8.57146C1.79411 8.57146 2.15982 8.71097 2.43839 8.98999L7.14286 13.6965L17.5625 3.27682C17.8393 2.99691 18.2054 2.85718 18.5714 2.85718C19.3348 2.85718 20 3.46878 20 4.28575Z" fill="#fff"/></svg>`;
    const checkGreenSvg = `<svg class="clip-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M20 4.28575C20 4.65128 19.8605 5.017 19.5815 5.29557L8.1529 16.7241C7.875 17.0045 7.50893 17.1429 7.14286 17.1429C6.77679 17.1429 6.41161 17.0034 6.13304 16.7244L0.41875 11.0101C0.139732 10.7322 0 10.3661 0 10C0 9.18396 0.667411 8.57146 1.42857 8.57146C1.79411 8.57146 2.15982 8.71097 2.43839 8.98999L7.14286 13.6965L17.5625 3.27682C17.8393 2.99691 18.2054 2.85718 18.5714 2.85718C19.3348 2.85718 20 3.46878 20 4.28575Z" fill="#4CAF50"/></svg>`;
    const availableSvg = `<svg class="clip-icon" viewBox="0 0 20 20" aria-hidden="true"><path d="M3.25 5H1.75C1.33594 5 1 5.3375 1 5.75V9C0.447812 9 0 9.44688 0 10C0 10.5522 0.447812 11 0.971875 11L1 14.25C1 14.6656 1.33594 15 1.75 15H3.25C3.66563 15 4 14.6656 4 14.25V5.75C4 5.3375 3.66563 5 3.25 5ZM14.25 3H12.75C12.3375 3 12 3.33594 12 3.75V9H8V3.75C8 3.33594 7.66563 3 7.25 3H5.75C5.3375 3 5 3.33594 5 3.75V16.25C5 16.6656 5.3375 17 5.75 17H7.25C7.66563 17 8 16.6656 8 16.25V11H12V16.25C12 16.6641 12.3359 17 12.75 17H14.25C14.6641 17 15 16.6641 15 16.25V3.75C15 3.33594 14.6656 3 14.25 3ZM19 9V5.75C19 5.3375 18.6656 5 18.25 5H16.75C16.3375 5 16 5.3375 16 5.75V14.25C16 14.6641 16.3359 15 16.75 15H18.25C18.6641 15 19 14.6641 19 14.25V11C19.5522 11 20 10.5522 20 10C20 9.44688 19.5531 9 19 9Z" fill="#fff"/></svg>`;

    const cardBackground = `url('https://images.unsplash.com/photo-1517836357463-d25dfeac3438?auto=format&fit=crop&w=1200&q=80')`;

    const variantLabels = {
      'x-first': 'X icon • Used first',
      'x-last': 'X icon • Used last',
      'x-red-first': 'Red X • Used first',
      'x-red-last': 'Red X • Used last',
      'check-first': 'Checkmark • Used first',
      'check-last': 'Checkmark • Used last',
      'check-green-first': 'Green checkmark • Used first',
      'check-green-last': 'Green checkmark • Used last'
    };

    function clipDot(type, usedStyle = 'check') {
      if (type === 'used') {
        let icon = checkSvg;
        if (usedStyle === 'x') icon = xSvg;
        if (usedStyle === 'x-red') icon = xRedSvg;
        if (usedStyle === 'check-green') icon = checkGreenSvg;
        return `<div class="clip-dot used-default">${icon}</div>`;
      }
      return `<div class="clip-dot">${availableSvg}</div>`;
    }

    function buildCard({title='Gift card', subtitle='12 clips left', left=12, total=20, used=8, icon='check', layout='first'} = {}) {
      let clipsHtml = '';

      if (layout === 'first') {
        for (let i = 0; i < total; i++) {
          clipsHtml += clipDot(i < used ? 'used' : 'available', icon);
        }
      } else {
        for (let i = 0; i < total; i++) {
          clipsHtml += clipDot(i >= (total - used) ? 'used' : 'available', icon);
        }
      }

      return `
        <div class="clip-card" style="--card-bg-image: ${cardBackground};" aria-label="${title}, ${left} of ${total} clips left">
          <div class="card-image-layer"></div>
          <div class="card-overlay-layer"></div>
          <div class="card-content">
            <div class="card-header">
              <div class="brand-area">
                <span class="brand-mark">${logoSvg}</span>
                <h3 class="card-title">${title}</h3>
                <p class="card-subtitle">${subtitle}</p>
              </div>
              <div class="card-counter">${left}/${total} clips left</div>
            </div>
            <div class="card-spacer"></div>
            <div class="clips-grid">${clipsHtml}</div>
          </div>
        </div>`;
    }

    function renderCards() {
      // Question 1: same quantity and same context across all cards to isolate icon + order + color.
      document.getElementById('variant-a').innerHTML = buildCard({left:12, total:20, used:8, icon:'x', layout:'first'});
      document.getElementById('variant-b').innerHTML = buildCard({left:12, total:20, used:8, icon:'x', layout:'last'});
      document.getElementById('variant-c').innerHTML = buildCard({left:12, total:20, used:8, icon:'x-red', layout:'first'});
      document.getElementById('variant-d').innerHTML = buildCard({left:12, total:20, used:8, icon:'x-red', layout:'last'});
      document.getElementById('variant-e').innerHTML = buildCard({left:12, total:20, used:8, icon:'check', layout:'first'});
      document.getElementById('variant-f').innerHTML = buildCard({left:12, total:20, used:8, icon:'check', layout:'last'});
      document.getElementById('variant-g').innerHTML = buildCard({left:12, total:20, used:8, icon:'check-green', layout:'first'});
      document.getElementById('variant-h').innerHTML = buildCard({left:12, total:20, used:8, icon:'check-green', layout:'last'});
    }

    document.querySelectorAll('input[name="preferred_combination"]').forEach(input => {
      input.addEventListener('change', renderCards);
    });

    let isSubmitting = false;

    document.getElementById('testForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      if (isSubmitting) return;

      const submitBtn = document.getElementById('submitBtn');
      const selectedCombo = document.querySelector('input[name="preferred_combination"]:checked')?.value;
      if (!selectedCombo) {
        document.querySelector('input[name="preferred_combination"]').reportValidity();
        return;
      }

      isSubmitting = true;
      submitBtn.disabled = true;
      submitBtn.textContent = 'Submitting...';

      const now = new Date();
      const payload = {
        preferred_combination: selectedCombo,
        combination_label: variantLabels[selectedCombo],
        design_comment: document.getElementById('designComment').value.trim(),
        timestamp: now.toLocaleString('da-DK', {
          timeZone: 'Europe/Copenhagen',
          year: 'numeric',
          month: '2-digit',
          day: '2-digit',
          hour: '2-digit',
          minute: '2-digit',
          second: '2-digit',
          hour12: false
        }),
        timestamp_iso: now.toISOString()
      };

      try {
        await fetch('https://script.google.com/macros/s/AKfycbwEZLivYTM7AyGOWCjre9ZIghV4Ar9nQAK30ZRFmm3DXzf3IGmibthB4KRJ6Zkfa7kkmQ/exec', {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'text/plain;charset=utf-8' },
          body: JSON.stringify(payload)
        });

        document.getElementById('introHeader').style.display = 'none';
        document.getElementById('testForm').style.display = 'none';
        document.getElementById('success').classList.add('show');
        window.scrollTo({ top: 0, behavior: 'smooth' });
      } catch (error) {
        console.error(error);
        alert('Error submitting. Please try again.');
        isSubmitting = false;
        submitBtn.disabled = false;
        submitBtn.textContent = 'Submit';
      }
    });

    renderCards();
  </script>
</body>
</html>
